<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'self' https://finnhub.io; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com;">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 44px; overflow: hidden; user-select: none; -webkit-user-select: none; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: #ffffff;
  color: #0F172A;
  display: flex;
  align-items: center;
  height: 44px;
  border-bottom: 2px solid #1A6BF5;
  -webkit-app-region: no-drag;
}

/* ── BRAND ──────────────────────────────────────────────────────────────────── */
.brand {
  display: flex; align-items: center; gap: 8px;
  padding: 0 16px; border-right: 1px solid #E2E8F0;
  height: 100%; flex-shrink: 0; cursor: pointer; transition: background .15s;
}
.brand:hover { background: #F8FAFC; }
.brand-icon {
  width: 26px; height: 26px; background: #1A6BF5; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.brand-name { font-size: 14px; font-weight: 700; color: #0F172A; letter-spacing: -.4px; white-space: nowrap; }
.brand-name span { color: #1A6BF5; }

/* ── SEARCH ─────────────────────────────────────────────────────────────────── */
.search-zone {
  display: flex; align-items: center; gap: 6px;
  padding: 0 12px; border-right: 1px solid #E2E8F0;
  height: 100%; flex-shrink: 0;
}
#search-input {
  background: #F8FAFC; border: 1px solid #E2E8F0; border-radius: 7px;
  color: #0F172A; font-size: 12px; font-family: 'Inter', sans-serif;
  padding: 5px 11px; width: 130px; outline: none; transition: border-color .15s, box-shadow .15s;
}
#search-input:focus { border-color: #1A6BF5; box-shadow: 0 0 0 3px rgba(26,107,245,.12); background: #fff; }
#search-input::placeholder { color: #94A3B8; }
.search-btn {
  background: #1A6BF5; border: none; border-radius: 7px; color: #fff;
  font-size: 12px; font-weight: 600; font-family: 'Inter', sans-serif;
  padding: 5px 12px; cursor: pointer; white-space: nowrap; transition: background .15s;
}
.search-btn:hover { background: #1558D6; }

/* ── TICKER TAPE ─────────────────────────────────────────────────────────────── */
.ticker-viewport {
  flex: 1; overflow: hidden; position: relative; height: 100%;
  mask-image: linear-gradient(to right, transparent 0%, black 2%, black 98%, transparent 100%);
  -webkit-mask-image: linear-gradient(to right, transparent 0%, black 2%, black 98%, transparent 100%);
}
.ticker-tape {
  display: flex; position: absolute; left: 0; top: 0;
  height: 100%; align-items: center; white-space: nowrap; will-change: transform;
}
.tick-item {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 0 14px; height: 100%; cursor: pointer;
  border-right: 1px solid #F1F5F9; transition: background .1s; flex-shrink: 0;
}
.tick-item:hover { background: #F0F7FF; }
.tick-sym { font-size: 12px; font-weight: 700; color: #0F172A; letter-spacing: .01em; }
.tick-price { font-size: 12px; color: #475569; font-family: 'JetBrains Mono', monospace; }
.tick-chg { font-size: 11px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
.tick-chg.up { color: #16A34A; }
.tick-chg.dn { color: #DC2626; }
.tick-chg.flat { color: #94A3B8; }
.tick-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.tick-dot.up { background: #16A34A; }
.tick-dot.dn { background: #DC2626; }
.tick-dot.flat { background: #CBD5E1; }

/* ── MARKET STATUS ───────────────────────────────────────────────────────────── */
.market-status {
  display: flex; align-items: center; gap: 6px;
  padding: 0 12px; border-right: 1px solid #E2E8F0;
  border-left: 1px solid #E2E8F0; height: 100%; flex-shrink: 0;
}
.status-pill {
  display: flex; align-items: center; gap: 5px;
  padding: 3px 8px; border-radius: 20px; font-size: 10px; font-weight: 700;
  letter-spacing: .05em; text-transform: uppercase; flex-shrink: 0;
}
.status-pill.open  { background: #DCFCE7; color: #15803D; }
.status-pill.pre   { background: #FEF9C3; color: #92400E; }
.status-pill.closed { background: #F1F5F9; color: #64748B; }
.status-dot { width: 5px; height: 5px; border-radius: 50%; }
.status-dot.open  { background: #16A34A; animation: pulse 2s infinite; }
.status-dot.pre   { background: #EAB308; animation: pulse 2s infinite; }
.status-dot.closed { background: #CBD5E1; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.3;} }
.status-time { font-size: 10px; color: #94A3B8; font-family: 'JetBrains Mono', monospace; }

/* ── AD ZONE ─────────────────────────────────────────────────────────────────── */
.ad-zone {
  width: 196px; height: 100%; flex-shrink: 0;
  border-left: 1px solid #E2E8F0; position: relative; overflow: hidden; cursor: pointer;
  background: #FAFBFF;
}
.ad-slide {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; gap: 8px; padding: 0 12px;
  opacity: 0; transition: opacity .6s ease;
}
.ad-slide.active { opacity: 1; }
.ad-slide:hover { background: #F0F7FF; }
.ad-logo { font-size: 12px; font-weight: 700; white-space: nowrap; letter-spacing: -.3px; }
.ad-sep { color: #E2E8F0; font-size: 14px; }
.ad-body { display: flex; flex-direction: column; gap: 1px; }
.ad-headline { font-size: 11px; font-weight: 600; color: #0F172A; white-space: nowrap; }
.ad-sub { font-size: 10px; color: #94A3B8; white-space: nowrap; }
.ad-cta {
  font-size: 10px; font-weight: 700; padding: 3px 8px;
  border-radius: 5px; white-space: nowrap; flex-shrink: 0;
  background: #1A6BF5; color: #fff; border: none;
}

/* ── EXIT BUTTON ─────────────────────────────────────────────────────────────── */
.exit-btn {
  width: 42px; height: 100%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  border-left: 1px solid #E2E8F0; cursor: pointer;
  color: #94A3B8; font-size: 16px; font-weight: 500;
  transition: all .15s; background: #fff;
}
.exit-btn:hover { background: #FEF2F2; color: #DC2626; }

/* ── SETTINGS OVERLAY ────────────────────────────────────────────────────────── */
.settings-overlay {
  position: fixed; inset: 0; background: rgba(15,23,42,.4);
  display: none; align-items: center; justify-content: center; z-index: 9999;
}
.settings-overlay.open { display: flex; }
.settings-panel {
  background: #ffffff; border: 1px solid #E2E8F0;
  border-radius: 14px; padding: 24px; width: 380px;
  max-height: 80vh; overflow-y: auto;
  box-shadow: 0 20px 60px rgba(15,23,42,.15);
}
.settings-panel h2 { font-size: 16px; font-weight: 700; color: #0F172A; margin-bottom: 4px; }
.settings-subtitle { font-size: 13px; color: #64748B; margin-bottom: 20px; }
.settings-section { margin-bottom: 16px; }
.settings-label { font-size: 11px; font-weight: 600; color: #64748B; text-transform: uppercase; letter-spacing: .07em; margin-bottom: 8px; }
#tickers-input {
  width: 100%; background: #F8FAFC; border: 1px solid #E2E8F0;
  border-radius: 8px; color: #0F172A; font-family: 'JetBrains Mono', monospace;
  font-size: 12px; padding: 10px 12px; height: 90px; resize: none; outline: none;
  transition: border-color .15s;
}
#tickers-input:focus { border-color: #1A6BF5; box-shadow: 0 0 0 3px rgba(26,107,245,.1); }
.settings-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
.btn { padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; font-family: 'Inter', sans-serif; transition: all .15s; }
.btn-primary { background: #1A6BF5; color: #fff; }
.btn-primary:hover { background: #1558D6; }
.btn-secondary { background: #F8FAFC; color: #475569; border: 1px solid #E2E8F0; }
.btn-secondary:hover { background: #F1F5F9; }
</style>
</head>
<body>

<!-- BRAND -->
<div class="brand" id="brand-btn" title="Open PulseStock">
  <div class="brand-icon">P</div>
  <div class="brand-name">Pulse<span>Stock</span></div>
</div>

<!-- SEARCH -->
<div class="search-zone">
  <input id="search-input" type="text" placeholder="Search ticker..." maxlength="10"
    onkeydown="if(event.key==='Enter') doSearch()" />
  <button class="search-btn" onclick="doSearch()">Analyze ↗</button>
</div>

<!-- TICKER TAPE -->
<div class="ticker-viewport">
  <div class="ticker-tape" id="ticker-tape"></div>
</div>

<!-- MARKET STATUS -->
<div class="market-status">
  <div class="status-pill" id="status-pill">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text"></span>
  </div>
  <span class="status-time" id="status-time"></span>
</div>

<!-- AD ZONE -->
<div class="ad-zone" id="ad-zone"></div>

<!-- EXIT BUTTON -->
<div class="exit-btn" id="exit-btn" title="Quit PulseStock Ticker"
  onclick="if(window.pulseAPI)window.pulseAPI.quit();else window.close();">✕</div>

<!-- SETTINGS OVERLAY -->
<div class="settings-overlay" id="settings-overlay">
  <div class="settings-panel">
    <h2>Ticker Settings</h2>
    <div class="settings-subtitle">Customize which stocks appear in your ticker bar.</div>
    <div class="settings-section">
      <div class="settings-label">Tickers — one per line or comma-separated</div>
      <textarea id="tickers-input" placeholder="AAPL&#10;NVDA&#10;MSFT&#10;TSLA"></textarea>
    </div>
    <div class="settings-actions">
      <button class="btn btn-secondary" onclick="closeSettings()">Cancel</button>
      <button class="btn btn-primary" onclick="saveSettings()">Save changes</button>
    </div>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────────
let tickers   = ['AAPL','NVDA','MSFT','TSLA','META','AMZN','JPM','GOOGL','BRK-B','XOM'];
let quotes    = {};
let tapePx    = 0;
let tapeSpeed = 0.6;
let rafId     = null;
let adIndex   = 0;

const FINNHUB_KEY = 'd8fhh6hr01qn443a0bngd8fhh6hr01qn443a0bo0';

// ── ADS ────────────────────────────────────────────────────────────────────────
const ads = [
  { logo:'Webull',     logoColor:'#0075BF', headline:'Trade commission-free', sub:'$0 commissions · No minimums', url:'https://www.webull.com' },
  { logo:'IBKR',       logoColor:'#C8102E', headline:'Advanced trading tools', sub:'Lowest margin rates',          url:'https://www.interactivebrokers.com' },
  { logo:'Tastytrade', logoColor:'#E05C00', headline:'Options & futures',      sub:'$1 to open · $0 to close',    url:'https://tastytrade.com' },
];

function buildAdZone() {
  const zone = document.getElementById('ad-zone');
  zone.innerHTML = '';
  ads.forEach((ad, i) => {
    const div = document.createElement('div');
    div.className = 'ad-slide' + (i === 0 ? ' active' : '');
    div.innerHTML = `
      <span class="ad-logo" style="color:${ad.logoColor}">${ad.logo}</span>
      <span class="ad-sep">|</span>
      <div class="ad-body">
        <span class="ad-headline">${ad.headline}</span>
        <span class="ad-sub">${ad.sub}</span>
      </div>
      <span class="ad-cta">Open ↗</span>
    `;
    div.addEventListener('click', () => {
      if (window.pulseAPI) window.pulseAPI.openExternal(ad.url);
      else window.open(ad.url, '_blank');
    });
    zone.appendChild(div);
  });
}

function rotateAd() {
  const slides = document.querySelectorAll('.ad-slide');
  if (!slides.length) return;
  slides[adIndex].classList.remove('active');
  adIndex = (adIndex + 1) % ads.length;
  slides[adIndex].classList.add('active');
}

// ── MARKET STATUS — Intl DST-aware ────────────────────────────────────────────
function updateMarketStatus() {
  const now = new Date();
  const etParts = new Intl.DateTimeFormat('en-US', {
    timeZone: 'America/New_York',
    hour: 'numeric', minute: 'numeric', hour12: false, weekday: 'short'
  }).formatToParts(now);

  const get = (type) => etParts.find(p => p.type === type)?.value;
  const h   = parseInt(get('hour'), 10);
  const m   = parseInt(get('minute'), 10);
  const day = get('weekday');

  const isWeekday = !['Sat','Sun'].includes(day);
  const isRegular = isWeekday && (h > 9 || (h === 9 && m >= 30)) && h < 16;
  const isPre     = isWeekday && h >= 4 && (h < 9 || (h === 9 && m < 30));
  const isAfter   = isWeekday && h >= 16 && h < 20;

  const timeStr = new Intl.DateTimeFormat('en-US', {
    timeZone: 'America/New_York',
    hour: '2-digit', minute: '2-digit', hour12: true
  }).format(now);

  const pill = document.getElementById('status-pill');
  const dot  = document.getElementById('status-dot');
  const txt  = document.getElementById('status-text');
  const time = document.getElementById('status-time');

  if (isRegular) {
    pill.className='status-pill open'; dot.className='status-dot open'; txt.textContent='Open';
  } else if (isPre) {
    pill.className='status-pill pre'; dot.className='status-dot pre'; txt.textContent='Pre-market';
  } else if (isAfter) {
    pill.className='status-pill pre'; dot.className='status-dot pre'; txt.textContent='After-hours';
  } else {
    pill.className='status-pill closed'; dot.className='status-dot closed'; txt.textContent='Closed';
  }
  time.textContent = timeStr + ' ET';
}

// ── TICKER TAPE ────────────────────────────────────────────────────────────────
function buildTape() {
  const tape = document.getElementById('ticker-tape');
  const items = [...tickers, ...tickers, ...tickers].map(t => buildTickItem(t)).join('');
  tape.innerHTML = items;
  tapePx = 0;
  tape.style.transform = 'translateX(0px)';
}

function buildTickItem(ticker) {
  const q = quotes[ticker];
  let price = '—', chgStr = '—', cls = 'flat', dotCls = 'flat';
  if (q) {
    price = '$' + q.price.toFixed(2);
    const pct = q.changePct;
    if (pct > 0)      { chgStr = '▲ +' + pct.toFixed(2) + '%'; cls = 'up'; dotCls = 'up'; }
    else if (pct < 0) { chgStr = '▼ ' + pct.toFixed(2) + '%';  cls = 'dn'; dotCls = 'dn'; }
    else              { chgStr = '0.00%'; }
  }
  return `<div class="tick-item" data-ticker="${ticker}" onclick="openStock('${ticker}')">
    <span class="tick-sym">${ticker}</span>
    <span class="tick-price">${price}</span>
    <span class="tick-chg ${cls}">${chgStr}</span>
  </div>`;
}

function animateTape() {
  const tape = document.getElementById('ticker-tape');
  if (!tape) return;
  tapePx -= tapeSpeed;
  const items = tape.children;
  if (items.length > 0) {
    const oneSetWidth = items[0].offsetWidth * tickers.length;
    if (Math.abs(tapePx) >= oneSetWidth) tapePx += oneSetWidth;
  }
  tape.style.transform = `translateX(${tapePx}px)`;
  rafId = requestAnimationFrame(animateTape);
}

// ── QUOTES ─────────────────────────────────────────────────────────────────────
async function fetchQuotes() {
  try {
    if (window.pulseAPI) {
      quotes = await window.pulseAPI.getQuotes(tickers);
    } else {
      const results = await Promise.all(tickers.map(async t => {
        try {
          const r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${t}&token=${FINNHUB_KEY}`);
          const d = await r.json();
          return [t, d.c ? { price: d.c, changePct: d.dp, change: d.d } : null];
        } catch(e) { return [t, null]; }
      }));
      quotes = Object.fromEntries(results.filter(([,v]) => v));
    }
    buildTape();
  } catch(e) {
    console.error('Quote fetch error:', e);
  }
}

// ── SEARCH ─────────────────────────────────────────────────────────────────────
function doSearch() {
  const input = document.getElementById('search-input');
  const ticker = input.value.trim().toUpperCase().replace(/[^A-Z0-9.-]/g, '');
  if (!ticker) return;
  openStock(ticker);
  input.value = '';
}

function openStock(ticker) {
  const url = `https://pulsestock-nu.vercel.app/?ticker=${ticker}`;
  if (window.pulseAPI) window.pulseAPI.openExternal(url);
  else window.open(url, '_blank');
}

// ── BRAND ──────────────────────────────────────────────────────────────────────
document.getElementById('brand-btn').addEventListener('click', () => {
  const url = 'https://pulsestock-nu.vercel.app';
  if (window.pulseAPI) window.pulseAPI.openExternal(url);
  else window.open(url, '_blank');
});

// ── SETTINGS ───────────────────────────────────────────────────────────────────
function openSettings() {
  document.getElementById('tickers-input').value = tickers.join('\n');
  document.getElementById('settings-overlay').classList.add('open');
}
function closeSettings() {
  document.getElementById('settings-overlay').classList.remove('open');
}
async function saveSettings() {
  const raw = document.getElementById('tickers-input').value;
  const newTickers = raw.split(/[\n,]+/).map(t => t.trim().toUpperCase()).filter(t => /^[A-Z0-9.\-]{1,10}$/.test(t));
  if (!newTickers.length) return alert('Enter at least one valid ticker.');
  tickers = newTickers;
  if (window.pulseAPI) await window.pulseAPI.saveSettings({ tickers });
  closeSettings();
  await fetchQuotes();
  buildTape();
}

document.addEventListener('contextmenu', e => {
  if (e.target.closest('.tick-item') || e.target.closest('.brand')) {
    e.preventDefault(); openSettings();
  }
});
document.getElementById('brand-btn').addEventListener('contextmenu', e => {
  e.preventDefault(); openSettings();
});
window.pulseAPI?.onOpenSettings(() => openSettings());

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeSettings();
  if ((e.metaKey || e.ctrlKey) && e.key === ',') openSettings();
});

// ── INIT ───────────────────────────────────────────────────────────────────────
async function init() {
  if (window.pulseAPI) {
    const saved = await window.pulseAPI.getSettings();
    if (saved?.tickers?.length) tickers = saved.tickers;
  }
  buildAdZone();
  updateMarketStatus();
  await fetchQuotes();
  buildTape();
  rafId = requestAnimationFrame(animateTape);
  setInterval(fetchQuotes, 15000);
  setInterval(rotateAd, 8000);
  setInterval(updateMarketStatus, 30000);
}

init();

// ── MOUSE PASSTHROUGH ──────────────────────────────────────────────────────────
document.addEventListener('mouseleave', () => window.pulseAPI?.setIgnoreMouse(true));
document.addEventListener('mouseenter', () => window.pulseAPI?.setIgnoreMouse(false));
window.pulseAPI?.setIgnoreMouse(false);
</script>
</body>
</html>
